name: Build, push, and deploy

# Triggered on every push to main, or manually via GitHub UI.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  # ── Job 1: Build & push both images to GHCR (runs on GitHub cloud) ───────
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            dockerfile: artifacts/api-server/Dockerfile
          - name: web
            dockerfile: artifacts/alfath-pos/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute lowercase image name
        id: img
        run: echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')-${{ matrix.name }}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.img.outputs.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 2: Pull & restart on your local STB (runs on self-hosted runner) ─
  # The runner is installed on the STB itself — it connects OUT to GitHub,
  # so no port forwarding or public IP is needed.
  #
  # One-time setup on the STB:
  #   → Follow the instructions at:
  #     GitHub repo → Settings → Actions → Runners → New self-hosted runner
  #     Choose: Linux / ARM64
  #   → Then run these on the STB:
  #     mkdir ~/actions-runner && cd ~/actions-runner
  #     curl -o actions-runner-linux-arm64-2.321.0.tar.gz -L https://github.com/actions/runner/releases/download/v2.321.0/actions-runner-linux-arm64-2.321.0.tar.gz
  #     tar xzf ./actions-runner-linux-arm64-2.321.0.tar.gz
  #     ./config.sh --url https://github.com/USERNAME/NAMA_REPO --token TOKEN_DARI_GITHUB
  #     sudo ./svc.sh install && sudo ./svc.sh start
  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - name: Pull latest images from GHCR
        run: |
          cd ${{ secrets.DEPLOY_DIR }}
          docker compose -f docker-compose.prod.yml pull

      - name: Restart app containers (database keeps running)
        run: |
          cd ${{ secrets.DEPLOY_DIR }}
          docker compose -f docker-compose.prod.yml up -d --no-deps api web

      - name: Clean up old images
        run: docker image prune -f
